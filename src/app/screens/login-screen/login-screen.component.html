<section class="login-page">
  <!-- Decorative background elements -->
  <div class="circle circle-1"></div>
  <div class="circle circle-2"></div>
  <div class="circle circle-3"></div>

  <!-- Header Logo -->
  <header class="login-header">
    <img src="/assets/images/escudoB.png" alt="Logo" class="logo-app" />
    <div class="brand-text">
       <span class="brand-title">Sistema Escolar</span>
    </div>
  </header>

  <div class="login-content">
    <!-- Left: Illustration -->
    <div class="illustration-col">
       <div class="welcome-message">
         <h2>¡Bienvenido de nuevo!</h2>
         <p>Nos alegra verte otra vez</p>
       </div>
       <img src="/assets/images/bienvenida.png" alt="Ilustración" class="main-illustration" />
    </div>

    <!-- Right: Login Card -->
    <div class="form-col">
      <div class="glass-card">
        <h2 class="form-title">Iniciar sesión</h2>
        <div class="title-divider"></div>
        <p class="form-subtitle">Ingresa los datos que registraste</p>

        <form (ngSubmit)="login()" class="login-form" #form="ngForm">
          <div class="form-group">
            <label for="email">Correo electrónico</label>
            <input
              type="email"
              [(ngModel)]="username"
              name="username"
              class="form-control"
              id="email"
              placeholder="nombre@correo.com"
              autocomplete="username"
            />
            <div *ngIf="errors.username" class="invalid-feedback">{{ errors.username }}</div>
          </div>

          <div class="form-group">
            <label for="password">Contraseña</label>
            <div class="password-input-wrapper">
              <input
                [type]="type"
                [(ngModel)]="password"
                id="password"
                name="password_user"
                class="form-control"
                placeholder="Mínimo 8 caracteres"
                autocomplete="current-password"
                (keyup.enter)="login()"
              />
              <span class="show-password" (click)="showPassword()">
                <i [ngClass]="type == 'password' ? 'bi bi-eye-fill' : 'bi bi-eye-slash-fill'"></i>
              </span>
            </div>
            <div *ngIf="errors.password" class="invalid-feedback">{{ errors.password }}</div>
          </div>

          <div class="forgot-wrapper">
            <a (click)="router.navigate(['olvide-contrasena'])" class="forgot-link">¿Olvidaste tu contraseña?</a>
          </div>

          <button class="btn-submit" type="submit" [disabled]="load">Iniciar sesión</button>

          <div class="register-wrapper">
            ¿No tienes cuenta? <a (click)="registrar()">Regístrate</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</section>
